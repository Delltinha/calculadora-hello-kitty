<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora</title>
<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffd6e7,#fff0f6);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}
.container{
    background:white;
    width:450px;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(255,105,180,.3);
    border:4px solid #ff69b4;
    text-align:center;
}
.kitty{ width:130px; height:auto; }
h1{ color:#ff1493; }
input{
    width:90%;
    padding:12px;
    margin:8px;
    border:2px solid #ff69b4;
    border-radius:10px;
    font-size:16px;
}
button{
    background:#ff69b4;
    color:white;
    border:none;
    padding:12px 30px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}
button:hover{ background:#ff1493; }
.resultado{
    margin-top:20px;
    background:#fff0f6;
    padding:15px;
    border-radius:15px;
}
p{ font-weight:bold; }
</style>
</head>
<body>

<div class="container">
    <img class="kitty"
         src="https://upload.wikimedia.org/wikipedia/en/0/05/Hello_kitty_character_portrait.png"
         alt="Hello Kitty">

    <h1>Calculadora</h1>

    <input type="text" id="v1" placeholder="Digite o primeiro número">
    <input type="text" id="v2" placeholder="Digite o segundo número">

    <br>

    <button onclick="calcular()">Calcular</button>

    <div class="resultado">
        <p id="p1"></p>
        <p id="p2"></p>
        <p id="p3"></p>
        <p id="p4"></p>
        <p id="p5"></p>
    </div>
</div>

<script>
function calcular(){
    let v1 = Number(document.getElementById("v1").value);
    let v2 = Number(document.getElementById("v2").value);

    if (document.getElementById("v1").value === "" ||
        document.getElementById("v2").value === "" ||
        isNaN(v1) || isNaN(v2)) {
        document.getElementById("p1").textContent = "⚠️ Digite dois números válidos!";
        document.getElementById("p2").textContent = "";
        document.getElementById("p3").textContent = "";
        document.getElementById("p4").textContent = "";
        document.getElementById("p5").textContent = "";
        return;
    }

    document.getElementById("p1").textContent = "Soma: " + (v1 + v2);
    document.getElementById("p2").textContent = "Subtração: " + (v1 - v2);
    document.getElementById("p3").textContent = "Multiplicação: " + (v1 * v2);
    document.getElementById("p4").textContent =
        v2 === 0 ? "Divisão: não dá pra dividir por zero 🙀"
                 : "Divisão: " + (v1 / v2);
    document.getElementById("p5").textContent =
        v2 === 0 ? "Resto: —"
                 : "Resto: " + (v1 % v2);
}
</script>

</body>
</html>
